name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - run: npm run build:plugin
      - run: npm run build:mcpb
      - uses: actions/upload-artifact@v4
        with:
          name: mssql-mcp-server-plugin
          path: dist/plugin/*.plugin
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: mssql-mcp-server-mcpb
          path: dist/mcpb/*.mcpb
          retention-days: 14
